<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Connection 03 · Generación de activos digitales</title>
  <meta name="description" content="Píldora Doc ROI para generar activos digitales y construir un prompt personalizado.">
  <style>
    html,body{margin:0;min-height:100%;background:#F6F7F9;color:#0B0F19;font-family:Inter,Arial,sans-serif}
    .loading{min-height:100vh;display:grid;place-items:center;padding:24px;text-align:center;font-weight:800}
  </style>
</head>
<body>
  <div class="loading">Cargando Connection 03...</div>
  <script>
    fetch('connection_03_activos_digitales_pildora_wordpress.txt')
      .then(function(response){
        if(!response.ok){throw new Error('No se pudo cargar el contenido.');}
        return response.text();
      })
      .then(function(html){
        html = html
          .replace('<!-- wp:html -->','')
          .replace('<!-- /wp:html -->','');
        html += '<style>.docroi-hero .docroi-card p,.docroi-hero .docroi-card .docroi-muted{color:#4B5870!important}.docroi-hero .docroi-card h2{color:#0B0F19!important}</style>';
        document.open();
        document.write('<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Connection 03 · Generación de activos digitales</title></head><body style="margin:0">' + html + '</body></html>');
        document.close();
      })
      .catch(function(error){
        document.body.innerHTML = '<main style="min-height:100vh;display:grid;place-items:center;padding:24px;font-family:Arial,sans-serif;text-align:center"><div><h1>No se pudo cargar la página</h1><p>' + error.message + '</p></div></main>';
      });
  </script>
</body>
</html>
