<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Connection 03 · Generación de activos digitales</title>
  <meta name="description" content="Píldora Doc ROI para generar una ficha web ecommerce desde producto, buyer persona, logo y fotos.">
  <style>
    html,body{margin:0;min-height:100%;background:#F6F7F9;color:#0B0F19;font-family:Inter,Arial,sans-serif}
    #docroi-loader{min-height:100vh;display:grid;place-items:center;padding:24px;text-align:center;font-weight:800;color:#fff;background:#06101f}
  </style>
</head>
<body>
  <div id="docroi-loader">Cargando Connection 03...</div>
  <script>
    var DOCROI_LOGO = 'https://docroi.marketing/wp-content/uploads/2024/12/Logo_Doctor_ROI.jpg';
    var DOCROI_BOTIQUIN = 'https://el-botiquin-del-doc-roi.vercel.app/';

    function addGlobalHeader(){
      if(document.querySelector('.docroi-global-header')) return;
      var css = document.createElement('style');
      css.textContent = 'html{scroll-behavior:smooth}.docroi-global-header{position:sticky;top:0;z-index:999;background:#03060C;border-bottom:1px solid rgba(255,255,255,.12)}.docroi-global-header .docroi-wrap{max-width:1120px;margin:0 auto;width:calc(100% - 40px);display:flex;align-items:center;justify-content:space-between;gap:18px;padding:12px 0}.docroi-global-brand{display:inline-flex;align-items:center;text-decoration:none}.docroi-global-brand img{width:188px;height:54px;object-fit:contain;display:block}.docroi-header-actions{display:flex;align-items:center;justify-content:flex-end;gap:10px;flex-wrap:wrap}.docroi-header-actions a{min-height:44px;display:inline-flex;align-items:center;justify-content:center;padding:0 14px;border:1px solid rgba(255,255,255,.18);border-radius:8px;color:#F3F4F6!important;text-decoration:none!important;font-size:14px;font-weight:900;line-height:1;white-space:nowrap}.docroi-header-actions .docroi-header-cta{background:#fff!important;color:#0B0F19!important;border-color:#fff!important;padding:0 18px}.docroi-section,.docroi-hero,#constructor-prompt{scroll-margin-top:96px}.docroi-product-alert{background:#0B0F19;color:#fff;border-radius:18px;padding:18px;margin-top:18px}.docroi-product-alert strong{color:#fff!important}.docroi-product-alert p{color:#D8ECF8!important;margin:6px 0 0;font-size:14px;line-height:1.55}.docroi-product-alert a{color:#D8ECF8!important;font-weight:900}.docroi-product-priority{border:2px solid #003B5C!important;box-shadow:0 18px 42px rgba(0,59,92,.14)!important}@media(max-width:720px){.docroi-global-header .docroi-wrap{align-items:flex-start;flex-direction:column}.docroi-header-actions{width:100%;justify-content:flex-start}.docroi-header-actions a{flex:1 1 auto}.docroi-header-actions .docroi-header-cta{flex-basis:100%}.docroi-global-brand img{width:160px;height:46px}}';
      document.head.appendChild(css);
      var header = document.createElement('header');
      header.className = 'docroi-global-header';
      header.innerHTML = '<div class="docroi-wrap"><a class="docroi-global-brand" href="'+DOCROI_BOTIQUIN+'" target="_blank" rel="noopener" aria-label="Ir al Botiquín DOC ROI"><img src="'+DOCROI_LOGO+'" alt="DOC ROI"></a><nav class="docroi-header-actions" aria-label="Navegación principal DOC ROI"><a href="#constructor-prompt">Método</a><a href="https://connection-04-ficha-de-producto.vercel.app/" target="_blank" rel="noopener">Recursos</a><a class="docroi-header-cta" href="#constructor-prompt">Abrir herramienta</a></nav></div>';
      document.body.insertAdjacentElement('afterbegin', header);
      document.querySelectorAll('img[src*="Logo"],img[alt*="Doc ROI"],img[alt*="DOC ROI"]').forEach(function(img){
        img.alt = 'DOC ROI';
        var link = img.closest('a');
        if(link){ link.href = DOCROI_BOTIQUIN; link.target = '_blank'; link.rel = 'noopener'; }
      });
      document.addEventListener('click',function(event){
        var link = event.target.closest('a[href^="#"]');
        if(!link) return;
        var id = link.getAttribute('href').slice(1);
        var target = document.getElementById(id);
        if(!target) return;
        event.preventDefault();
        target.scrollIntoView({behavior:'smooth',block:'start'});
      });
    }

    function injectProductFichaFlow(){
      addGlobalHeader();
      var buyerCheckbox = document.getElementById('docroiAdjuntaBuyer');
      if(buyerCheckbox && !document.getElementById('docroiProducto')){
        var buyerGroup = buyerCheckbox.closest('.docroi-group');
        if(buyerGroup){
          var buyerTitle = buyerGroup.querySelector('.docroi-group-title');
          var buyerHelp = buyerGroup.querySelector('.docroi-group-help');
          if(buyerTitle) buyerTitle.textContent = '3. Buyer persona';
          if(buyerHelp) buyerHelp.textContent = 'Esta fuente orienta tono, objeciones, argumentos y decisión de compra del público objetivo.';
          var productGroup = document.createElement('div');
          productGroup.className = 'docroi-group docroi-product-priority';
          productGroup.innerHTML = '<div class="docroi-group-head"><div><strong class="docroi-group-title">2. Ficha de producto ecommerce</strong><p class="docroi-group-help">Esta es la pieza nueva y obligatoria. Marca esta opción si subirás la ficha de producto de la píldora 4 al chat junto con el prompt.</p></div></div><div class="docroi-row docroi-row-contact"><div class="docroi-field"><label for="docroiProducto">Ficha de producto / resumen orientativo</label><textarea id="docroiProducto" oninput="docroiBuildPrompt()" placeholder="Si no vas a adjuntar la ficha, pega aquí la ficha completa: nombre, descripción, atributos, beneficios, precio, objeciones, uso, disponibilidad y propuesta de valor."></textarea></div></div><label class="docroi-option"><input id="docroiAdjuntaProducto" type="checkbox" onchange="docroiBuildPrompt()"><div>Subiré la ficha de producto de la píldora 4 junto con este prompt<span>La IA la usará como fuente principal para crear la ficha web ecommerce.</span></div></label><label class="docroi-option"><input id="docroiAdjuntaFotos" type="checkbox" onchange="docroiBuildPrompt()"><div>Subiré fotos reales del producto junto con este prompt<span>La IA usará las imágenes para hero, galería, contexto visual y argumentos de venta.</span></div></label><div class="docroi-product-alert"><strong>Objetivo del resultado</strong><p>Crear una ficha web ecommerce con vista previa o HTML completo, incluyendo comprar ahora, reservar o contactar para cerrar un acuerdo.</p><p><a href="https://connection-04-ficha-de-producto.vercel.app/" target="_blank" rel="noopener">Abrir píldora 4 · ficha de producto</a></p></div>';
          buyerGroup.insertAdjacentElement('beforebegin', productGroup);
        }
      }
      var note = document.querySelector('.docroi-note');
      if(note){ note.innerHTML = 'Crea o recupera la ficha de producto aquí: <a href="https://connection-04-ficha-de-producto.vercel.app/" target="_blank" rel="noopener" style="color:#003B5C;font-weight:900">connection-04-ficha-de-producto.vercel.app</a><br>Crea o recupera la ficha buyer persona aquí: <a href="https://buyer-persona-three.vercel.app/" target="_blank" rel="noopener" style="color:#003B5C;font-weight:900">buyer-persona-three.vercel.app</a>'; }
      overridePromptBuilder();
    }

    function overridePromptBuilder(){
      window.docroiBasePrompt = 'Actúa como estratega ecommerce, diseñador web senior, copywriter de conversión, desarrollador front-end y profesor de IA aplicada.\n\nOBJETIVO: crear una FICHA DE PRODUCTO WEB ECOMMERCE a partir de los archivos y datos del proyecto. Debe funcionar como una página de producto/landing comercial similar en ambición al ejemplo de Juan Valdez: https://juan-valdez.vercel.app/\n\nANTES DE RESPONDER, revisa los archivos adjuntos de este chat. Deben estar adjuntos si el usuario los ha marcado: logo de marca, ficha buyer persona de la píldora 2, ficha de producto de la píldora 4 y fotos reales del producto.\n\nFUENTES DE INFORMACIÓN\nBuyer persona: [MODO BUYER]\nLogo: [MODO LOGO]\nFicha de producto: [MODO PRODUCTO]\nFotos de producto: [MODO FOTOS]\n\nDATOS DEL PROYECTO\nNombre: [NOMBRE]\nColor principal: [COLOR PRINCIPAL]\nColor secundario: [COLOR SECUNDARIO]\nLogo / URL del logo: [LOGO]\nDatos de contacto, compra, reserva o acuerdo: [DATOS DE CONTACTO]\nEmail RGPD: [EMAIL RGPD]\nGoogle Maps: [URL GOOGLE MAPS]\nBuyer persona / resumen orientativo:\n[BUYER PERSONA]\nFicha de producto / resumen orientativo:\n[PRODUCTO]\n\nREGLA OBLIGATORIA\nNo crees una landing genérica. La página debe nacer de la ficha de producto y del buyer persona. Si falta la ficha de producto y tampoco hay resumen escrito, detente y pide al usuario que adjunte la ficha de producto o que la cree aquí: https://connection-04-ficha-de-producto.vercel.app/\n\nINSTRUCCIONES\nAnaliza ficha de producto, buyer persona, logo y fotos. Crea una ficha web ecommerce completa y responsive con hero, propuesta de valor, beneficios, atributos, galería, objeciones, FAQ y cierre comercial. Incluye SI O SI comprar ahora, reservar o contactar para cerrar un acuerdo. Entrega vista previa/artefacto HTML si la plataforma lo permite; si no, entrega un único index.html completo.';
      window.docroiBuildPrompt = function(){
        var adjuntaBuyer = docroiChecked('docroiAdjuntaBuyer');
        var adjuntaLogo = docroiChecked('docroiAdjuntaLogo');
        var adjuntaProducto = docroiChecked('docroiAdjuntaProducto');
        var adjuntaFotos = docroiChecked('docroiAdjuntaFotos');
        var data = {
          '[MODO BUYER]': adjuntaBuyer ? 'El usuario subirá la ficha buyer persona de la píldora 2.' : 'Usa el buyer persona escrito en este prompt.',
          '[MODO LOGO]': adjuntaLogo ? 'El usuario subirá el logo al chat.' : 'Usa la URL del logo si está disponible.',
          '[MODO PRODUCTO]': adjuntaProducto ? 'El usuario subirá la ficha de producto de la píldora 4. Úsala como fuente principal.' : 'Usa el campo de ficha de producto escrito en este prompt.',
          '[MODO FOTOS]': adjuntaFotos ? 'El usuario subirá fotos reales del producto.' : 'Si no hay fotos, marca [PENDIENTE] o propón indicaciones visuales.',
          '[NOMBRE]': docroiValue('docroiNombre','[NOMBRE]'),
          '[COLOR PRINCIPAL]': docroiValue('docroiColorPrincipal','#003B5C'),
          '[COLOR SECUNDARIO]': docroiValue('docroiColorSecundario','#D8ECF8'),
          '[DATOS DE CONTACTO]': docroiValue('docroiContacto','[DATOS DE CONTACTO]'),
          '[EMAIL RGPD]': docroiValue('docroiEmail','[EMAIL RGPD]'),
          '[URL GOOGLE MAPS]': docroiValue('docroiMaps','[URL GOOGLE MAPS]'),
          '[LOGO]': adjuntaLogo ? 'Logo adjunto. ' + docroiValue('docroiLogo','Sin URL adicional.') : docroiValue('docroiLogo','[URL DEL LOGO]'),
          '[BUYER PERSONA]': adjuntaBuyer ? 'Ficha buyer persona adjunta. Nota: ' + docroiValue('docroiBuyer','[SIN RESUMEN]') : docroiValue('docroiBuyer','[BUYER PERSONA]'),
          '[PRODUCTO]': adjuntaProducto ? 'Ficha de producto adjunta. Nota: ' + docroiValue('docroiProducto','[SIN RESUMEN]') : docroiValue('docroiProducto','[FICHA DE PRODUCTO]')
        };
        var prompt = window.docroiBasePrompt;
        Object.keys(data).forEach(function(key){ prompt = prompt.split(key).join(data[key]); });
        prompt = 'IMPORTANTE PARA ESTA EJECUCIÓN:\nSi el usuario marcó ficha de producto, buyer persona, logo o fotos, espera esos adjuntos en el chat y úsalos como fuente principal. Esta tarea debe crear una FICHA WEB ECOMMERCE de producto, con vista previa si es posible o con HTML completo, e incluir compra, reserva o contacto.\n\n' + prompt;
        var area = document.getElementById('docroiPromptArea');
        if(area) area.value = prompt;
        docroiSetStatus('Prompt ecommerce generado. Copia este prompt y súbelo a ChatGPT/Gemini junto con la ficha de producto, buyer persona, logo y fotos marcadas.');
        return prompt;
      };
      window.docroiBuildPrompt();
    }

    fetch('connection_03_activos_digitales_pildora_wordpress.txt?v=global-header-product-flow-20260620')
      .then(function(response){ if(!response.ok) throw new Error('No se pudo cargar el contenido.'); return response.text(); })
      .then(function(html){
        html = html.replace('<!-- wp:html -->','').replace('<!-- /wp:html -->','');
        html = html
          .replace('Convierte una idea formativa o profesional en un activo digital con estructura, propósito y valor reutilizable. Puedes trabajar pegando la información en el formulario o indicando que adjuntarás la ficha y el logo al conversar con la IA.', 'Convierte una ficha de producto, una ficha de buyer persona, el logo y las fotos del producto en una ficha web ecommerce lista para revisar en ChatGPT/Gemini, con vista previa o HTML completo.')
          .replace('Rellena los campos, marca si vas a adjuntar buyer persona o logo, genera el prompt personalizado y pégalo en ChatGPT o Gemini junto con esos archivos si has elegido esa opción.', 'Rellena los campos, marca qué archivos subirás al chat, genera el prompt ecommerce y pégalo en ChatGPT o Gemini junto con el logo, la ficha buyer persona, la ficha de producto y las fotos del producto.')
          .replace('Crear ficha buyer persona →</a>', 'Crear ficha buyer persona →</a><a href="https://connection-04-ficha-de-producto.vercel.app/" target="_blank" rel="noopener" class="docroi-btn docroi-btn-white">Crear ficha de producto →</a>')
          .replace('Primero define identidad y adjuntos, después buyer persona, y al final contacto. Si no marcas una casilla, el prompt usará lo escrito en los campos.', 'Primero define identidad, después ficha de producto, buyer persona y fotos. Al final añade contacto. Si marcas una casilla, recuerda subir ese archivo en ChatGPT/Gemini junto con el prompt.')
          .replace('Adjuntaré el logo en el chat de IA<span>El prompt pedirá a la IA que use el archivo de logo adjunto. Si no marcas esto, utilizará la URL del logo.</span>', 'Subiré el logo después a ChatGPT/Gemini junto con este prompt<span>Marca esta opción solo si también vas a subir el archivo del logo en el chat. Si no, deja la casilla vacía y usa una URL.</span>')
          .replace('Adjuntaré la ficha buyer persona de la píldora 2<span>El prompt pedirá a la IA que analice el documento adjunto. Puedes añadir un resumen breve para orientar.</span>', 'Subiré la ficha buyer persona después junto con este prompt<span>Marca esta opción solo si también vas a subir la ficha de la píldora 2 en ChatGPT/Gemini.</span>');
        document.open();
        document.write('<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Connection 03 · Generación de activos digitales</title></head><body style="margin:0">' + html + '</body></html>');
        document.close();
        setTimeout(injectProductFichaFlow,80);
        setTimeout(injectProductFichaFlow,500);
      })
      .catch(function(error){ document.body.innerHTML = '<main style="min-height:100vh;display:grid;place-items:center;padding:24px;font-family:Arial,sans-serif;text-align:center"><div><h1>No se pudo cargar la página</h1><p>' + error.message + '</p></div></main>'; });
  </script>
</body>
</html>
