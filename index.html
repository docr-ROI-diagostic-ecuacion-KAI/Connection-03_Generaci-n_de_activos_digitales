otivaciones, tono, contexto de compra y palabras clave.\\n3. Si hay logo adjunto o URL, úsalo como referencia visual.\\n4. Si hay fotos adjuntas, úsalas para plantear hero, galería, contexto de uso y argumentos visuales.\\n5. Crea una ficha web ecommerce completa y responsive.\\n6. Incluye SI O SI una zona de conversión con una de estas acciones: COMPRAR AHORA, RESERVAR o CONTACTAR PARA CERRAR UN ACUERDO. Si no sabes cuál conviene, propone las tres jerarquizadas.\\n7. No inventes datos críticos. Si falta algo secundario, marca [PENDIENTE].\\n8. Entrega una vista previa/artefacto HTML en el propio chat si la plataforma lo permite.\\n9. Si no puedes mostrar vista previa, entrega un único archivo index.html completo con CSS y JavaScript incluidos.\\n\\nESTRUCTURA OBLIGATORIA DE LA FICHA WEB\\n1. Cabecera con logo, nombre del producto y navegación.\\n2. Hero de producto con titular, subtítulo, imagen principal y CTA.\\n3. Propuesta de valor clara.\\n4. Beneficios principales conectados al buyer persona.\\n5. Atributos y ficha técnica.\\n6. Galería o bloque de imágenes del producto.\\n7. Uso, experiencia o contexto de consumo.\\n8. Objeciones y respuestas.\\n9. Prueba, confianza o garantía si hay información.\\n10. Preguntas frecuentes.\\n11. Bloque final de conversión: comprar, reservar o contactar.\\n12. Footer con contacto, RGPD, mapa o enlaces.\\n\\nREQUISITOS TÉCNICOS\\nUsa solo HTML5, CSS3 y JavaScript vanilla. No uses Bootstrap, React, Vue, Tailwind ni librerías externas. El archivo index.html debe incluir CSS dentro de <style> y JavaScript dentro de <script>. Debe ser responsive, profesional, legible y con buen contraste.\\n\\nSALIDA ESPERADA\\nPrimero escribe: He revisado los adjuntos y he creado una ficha web ecommerce orientada al buyer persona y a la ficha de producto. Después muestra la vista previa si es posible. Después entrega el código completo index.html.";window.docroiBuildPrompt=function(){var adjuntaBuyer=docroiChecked("docroiAdjuntaBuyer");var adjun ue("docroiBuyer","[BUYER PERSONA]"),"[PRODUCTO]":adjuntaProducto?"Ficha de producto adjunta por el usuario en el chat. Nota/resumen: "+docroiValue("docroiProducto","[SIN RESUMEN PEGADO]"):docroiValue("docroiProducto","[FICHA DE PRODUCTO]")};var prompt=docroiBasePrompt;Object.keys(data).forEach(function(key){prompt=prompt.split(key).join(data[key]);});prompt="IMPORTANTE PARA ESTA EJECUCIÓN:\\nAntes de ejecutar, comprueba qué archivos adjuntó el usuario. Si marcó ficha de producto, buyer persona, logo o fotos, espera esos adjuntos en el chat y úsalos como fuente principal. Esta tarea debe crear una FICHA WEB ECOMMERCE de producto, con vista previa si es posible o con HTML completo, e incluir compra, reserva o contacto.\\n\\n"+prompt;var area=document.getElementById("docroiPromptArea");if(area)area.value=prompt;docroiSetStatus("Prompt ecommerce generado. Copia este prompt y súbelo a ChatGPT/Gemini junto con la ficha de producto, buyer persona, logo y fotos marcadas.");return prompt;};docroiBuildPrompt();});})();<\/script>';
