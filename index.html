<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Connection 03 · Generación de activos digitales</title>
  <meta name="description" content="Píldora Doc ROI para generar una ficha web ecommerce desde producto, buyer persona, logo y fotos.">
  <style>
    html,body{margin:0;min-height:100%;background:#F6F7F9;color:#0B0F19;font-family:Inter,Arial,sans-serif}
    #docroi-loader{min-height:100vh;display:grid;place-items:center;padding:24px;text-align:center;font-weight:800;color:#fff;background:#06101f}
  </style>
</head>
<body>
  <div id="docroi-loader">Cargando Connection 03...</div>
  <script>
    var DOCROI_LOGO = 'https://docroi.marketing/wp-content/uploads/2024/12/Logo_Doctor_ROI.jpg';
    var DOCROI_BOTIQUIN = 'https://el-botiquin-del-doc-roi.vercel.app/';
    var PRODUCT_URL = 'https://connection-04-ficha-de-producto.vercel.app/';
    var BUYER_URL = 'https://buyer-persona-three.vercel.app/';

    function addGlobalHeader(){
      if(document.querySelector('.docroi-global-header')) return;
      var css = document.createElement('style');
      css.textContent = 'html{scroll-behavior:smooth}.docroi-global-header{position:sticky;top:0;z-index:999;background:#03060C;border-bottom:1px solid rgba(255,255,255,.12)}.docroi-global-header .docroi-wrap{max-width:1120px;margin:0 auto;width:calc(100% - 40px);display:flex;align-items:center;justify-content:space-between;gap:18px;padding:12px 0}.docroi-global-brand{display:inline-flex;align-items:center;text-decoration:none}.docroi-global-brand img{width:188px;height:54px;object-fit:contain;display:block}.docroi-header-actions{display:flex;align-items:center;justify-content:flex-end;gap:10px;flex-wrap:wrap}.docroi-header-actions a{min-height:44px;display:inline-flex;align-items:center;justify-content:center;padding:0 14px;border:1px solid rgba(255,255,255,.18);border-radius:8px;color:#F3F4F6!important;text-decoration:none!important;font-size:14px;font-weight:900;line-height:1;white-space:nowrap}.docroi-header-actions .docroi-header-cta{background:#fff!important;color:#0B0F19!important;border-color:#fff!important;padding:0 18px}.docroi-section,.docroi-hero,#constructor-prompt{scroll-margin-top:96px}.docroi-c03 .docroi-grid{align-items:start}.docroi-right-rail{display:grid;gap:14px;align-content:start;position:sticky;top:104px}.docroi-right-rail .docroi-prompt-frame{position:static!important;margin:0}.docroi-resource-link{display:inline-flex;margin-top:8px;color:#003B5C!important;font-size:12px;font-weight:900;text-decoration:underline;text-underline-offset:3px}.docroi-result-objective{background:#0B0F19;color:#fff;border:1px solid rgba(255,255,255,.10);border-radius:8px;padding:18px;margin:0;box-shadow:0 18px 42px rgba(11,15,25,.16)}.docroi-result-objective strong{display:block;color:#fff!important;font-size:13px;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}.docroi-result-objective p{margin:0;color:#D8ECF8!important;font-size:14px;line-height:1.6;font-weight:750}.docroi-product-alert{display:none}.docroi-product-priority{border:1px solid #D8ECF8!important;box-shadow:0 16px 34px rgba(0,59,92,.08)!important}.docroi-commitment{background:#EAF6FB;border:1px solid #D8ECF8;border-radius:8px;padding:16px;margin:0}.docroi-commitment h3{margin:0 0 6px!important;font-size:15px!important;line-height:1.25!important;color:#003B5C!important}.docroi-commitment p{margin:0 0 12px;color:#35506A;font-size:13px;line-height:1.5;font-weight:750}.docroi-commitment-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.docroi-commitment-item{display:flex!important;align-items:flex-start!important;gap:10px!important;background:#fff!important;border:1px solid #CFE8F7!important;border-radius:8px!important;padding:12px!important;font-size:13px!important;line-height:1.35!important;font-weight:900!important;cursor:pointer!important}.docroi-commitment-item input{width:18px!important;height:18px!important;margin:1px 0 0!important;accent-color:#003B5C!important;flex:0 0 auto!important}.docroi-commitment-item span{display:none!important}.docroi-optional-hint{display:block;margin-top:8px;color:#64748B;font-size:12px;line-height:1.45;font-weight:700}.docroi-compact-note{background:#EAF6FB;border:1px solid #D8ECF8;border-radius:8px;padding:13px 14px;color:#003B5C;font-size:13px;line-height:1.55;font-weight:800;margin:0 0 14px}.docroi-compact-note a{color:#003B5C!important;font-weight:900}.docroi-prompt-box{min-height:420px!important}.docroi-prompt-frame{border-radius:8px!important}.docroi-prompt-frame .docroi-btn{border-radius:999px!important}@media(max-width:960px){.docroi-right-rail{position:static}.docroi-commitment-grid{grid-template-columns:1fr}}@media(max-width:720px){.docroi-global-header .docroi-wrap{align-items:flex-start;flex-direction:column}.docroi-header-actions{width:100%;justify-content:flex-start}.docroi-header-actions a{flex:1 1 auto}.docroi-header-actions .docroi-header-cta{flex-basis:100%}.docroi-global-brand img{width:160px;height:46px}.docroi-result-objective,.docroi-commitment{padding:14px}.docroi-prompt-box{min-height:360px!important}}';
      document.head.appendChild(css);
      var header = document.createElement('header');
      header.className = 'docroi-global-header';
      header.innerHTML = '<div class="docroi-wrap"><a class="docroi-global-brand" href="'+DOCROI_BOTIQUIN+'" target="_blank" rel="noopener" aria-label="Ir al Botiquín DOC ROI"><img src="'+DOCROI_LOGO+'" alt="DOC ROI"></a><nav class="docroi-header-actions" aria-label="Navegación principal DOC ROI"><a href="#constructor-prompt">Método</a><a href="'+PRODUCT_URL+'" target="_blank" rel="noopener">Recursos</a><a class="docroi-header-cta" href="#constructor-prompt">Abrir herramienta</a></nav></div>';
      document.body.insertAdjacentElement('afterbegin', header);
      document.querySelectorAll('img[src*="Logo"],img[alt*="Doc ROI"],img[alt*="DOC ROI"]').forEach(function(img){
        img.alt = 'DOC ROI';
        var link = img.closest('a');
        if(link){ link.href = DOCROI_BOTIQUIN; link.target = '_blank'; link.rel = 'noopener'; }
      });
      document.addEventListener('click',function(event){
        var link = event.target.closest('a[href^="#"]');
        if(!link) return;
        var id = link.getAttribute('href').slice(1);
        var target = document.getElementById(id);
        if(!target) return;
        event.preventDefault();
        target.scrollIntoView({behavior:'smooth',block:'start'});
      });
    }

    function ensureRightRail(){
      var frame = document.querySelector('.docroi-prompt-frame');
      if(!frame) return null;
      var rail = frame.closest('.docroi-right-rail');
      if(rail) return rail;
      rail = document.createElement('div');
      rail.className = 'docroi-right-rail';
      frame.parentNode.insertBefore(rail, frame);
      rail.appendChild(frame);
      return rail;
    }

    function setOptionLabel(id, title){
      var input = document.getElementById(id);
      if(!input) return null;
      var label = input.closest('label');
      if(!label) return null;
      label.classList.add('docroi-commitment-item');
      var wrapper = label.querySelector('div');
      if(wrapper){ wrapper.innerHTML = title; }
      return label;
    }

    function addFieldLinks(){
      var product = document.getElementById('docroiProducto');
      if(product){
        product.placeholder = 'Opcional si vas a subir la ficha. Si no la adjuntas, pega aquí nombre, descripción, atributos, beneficios, precio, objeciones, uso y propuesta de valor.';
        var pLabel = product.closest('.docroi-field').querySelector('label');
        if(pLabel && !pLabel.querySelector('a')) pLabel.insertAdjacentHTML('beforeend',' <a class="docroi-resource-link" href="'+PRODUCT_URL+'" target="_blank" rel="noopener">crear ficha</a>');
      }
      var buyer = document.getElementById('docroiBuyer');
      if(buyer){
        buyer.placeholder = 'Opcional si vas a subir la ficha. Si no la adjuntas, pega aquí el buyer persona completo o un resumen útil para orientar el resultado.';
        var bLabel = buyer.closest('.docroi-field').querySelector('label');
        if(bLabel && !bLabel.querySelector('a')) bLabel.insertAdjacentHTML('beforeend',' <a class="docroi-resource-link" href="'+BUYER_URL+'" target="_blank" rel="noopener">crear buyer persona</a>');
      }
      var logo = document.getElementById('docroiLogo');
      if(logo) logo.placeholder = 'URL del logo si no lo adjuntas';
    }

    function buildAttachmentChecklist(){
      var rail = ensureRightRail();
      if(!rail || document.querySelector('.docroi-commitment')) return;
      var commitment = document.createElement('div');
      commitment.className = 'docroi-commitment';
      commitment.innerHTML = '<h3>Recuerda adjuntar los anexos en tu IA generativa</h3><p>Haz click en los anexos que vas a adjuntar junto con el prompt. El prompt indicará a la IA que los use como fuente.</p><div class="docroi-commitment-grid"></div>';
      rail.appendChild(commitment);
      var grid = commitment.querySelector('.docroi-commitment-grid');
      [
        ['docroiAdjuntaProducto','Ficha de producto'],
        ['docroiAdjuntaBuyer','Buyer persona'],
        ['docroiAdjuntaLogo','Logo de marca'],
        ['docroiAdjuntaFotos','Fotos del producto']
      ].forEach(function(item){
        var label = setOptionLabel(item[0], item[1]);
        if(label) grid.appendChild(label);
      });
    }

    function addObjectiveAbovePrompt(){
      var rail = ensureRightRail();
      var frame = document.querySelector('.docroi-prompt-frame');
      if(!rail || !frame || document.querySelector('.docroi-result-objective')) return;
      var objective = document.createElement('div');
      objective.className = 'docroi-result-objective';
      objective.innerHTML = '<strong>Objetivo del resultado</strong><p>Crear una ficha de producto web ecommerce, similar en ambición al ejemplo de Juan Valdez, con visor o vista previa interactiva dentro del chat si la plataforma lo permite, y con llamada clara a comprar, reservar o contactar.</p>';
      rail.insertBefore(objective, frame);
    }

    function injectProductFichaFlow(){
      addGlobalHeader();
      ensureRightRail();
      var buyerCheckbox = document.getElementById('docroiAdjuntaBuyer');
      if(buyerCheckbox && !document.getElementById('docroiProducto')){
        var buyerGroup = buyerCheckbox.closest('.docroi-group');
        if(buyerGroup){
          var buyerTitle = buyerGroup.querySelector('.docroi-group-title');
          var buyerHelp = buyerGroup.querySelector('.docroi-group-help');
          if(buyerTitle) buyerTitle.textContent = '3. Buyer persona';
          if(buyerHelp) buyerHelp.innerHTML = 'Apoyo opcional. Si subes la ficha de la píldora 2, basta con una nota breve. <a class="docroi-resource-link" href="'+BUYER_URL+'" target="_blank" rel="noopener">Abrir píldora buyer persona</a>';
          var productGroup = document.createElement('div');
          productGroup.className = 'docroi-group docroi-product-priority';
          productGroup.innerHTML = '<div class="docroi-group-head"><div><strong class="docroi-group-title">2. Ficha de producto ecommerce</strong><p class="docroi-group-help">Apoyo opcional. Si subes la ficha de producto de la píldora 4, basta con una nota breve. <a class="docroi-resource-link" href="'+PRODUCT_URL+'" target="_blank" rel="noopener">Abrir píldora ficha de producto</a></p></div></div><div class="docroi-row docroi-row-contact"><div class="docroi-field"><label for="docroiProducto">Ficha de producto / resumen orientativo</label><textarea id="docroiProducto" oninput="docroiBuildPrompt()"></textarea><span class="docroi-optional-hint">Rellena esta caja solo si no vas a adjuntar la ficha completa.</span></div></div><label class="docroi-option"><input id="docroiAdjuntaProducto" type="checkbox" onchange="docroiBuildPrompt()"><div>Ficha de producto</div></label><label class="docroi-option"><input id="docroiAdjuntaFotos" type="checkbox" onchange="docroiBuildPrompt()"><div>Fotos del producto</div></label>';
          buyerGroup.insertAdjacentElement('beforebegin', productGroup);
        }
      }
      var note = document.querySelector('.docroi-note');
      if(note){ note.className = 'docroi-compact-note'; note.innerHTML = 'Recursos: <a href="'+PRODUCT_URL+'" target="_blank" rel="noopener">ficha de producto</a> · <a href="'+BUYER_URL+'" target="_blank" rel="noopener">buyer persona</a>'; }
      addFieldLinks();
      addObjectiveAbovePrompt();
      buildAttachmentChecklist();
      overridePromptBuilder();
    }

    function viewerInstructionBlock(){
      return 'INSTRUCCIÓN PRIORITARIA DE VISOR\n\nAntes de entregar código, ZIP, captura o enlaces, debes mostrar la página renderizada dentro del chat en un visor interactivo tipo navegador.\n\nLa entrega solo se considera válida cuando yo pueda ver la ficha web ecommerce directamente en el chat como página renderizada, no como imagen estática, no como enlace descargable y no solo como código.\n\nUsa, por este orden:\n1. Canvas / Artefacto HTML interactivo si está disponible.\n2. Vista previa HTML renderizada dentro del chat.\n3. Iframe o visor embebido generado desde el HTML.\n4. Solo si la plataforma bloquea todas las opciones anteriores, dilo explícitamente antes de entregar archivos:\n“No he podido abrir el visor interactivo dentro del chat por limitación técnica de la plataforma.”\n\nPROHIBIDO sustituir el visor por:\n- una captura PNG,\n- un enlace sandbox,\n- un ZIP,\n- código suelto,\n- una explicación.\n\nPrimero quiero ver la página funcionando dentro del chat.\nDespués, y solo después, entrega el index.html completo.\n\nSALIDA OBLIGATORIA\n\n1. Primero escribe:\n“He revisado los adjuntos y he creado una ficha web ecommerce orientada al buyer persona y a la ficha de producto.”\n\n2. Inmediatamente después, abre un VISOR HTML INTERACTIVO DENTRO DEL CHAT con la página ya renderizada.\n\n3. El visor debe mostrar la ficha ecommerce completa, navegable y responsive.\n\n4. No entregues todavía el código si el visor no se ha mostrado.\n\n5. Si el visor falla, detén la ejecución y explica el fallo. No sustituyas el visor por captura, enlace, ZIP ni código.\n\n6. Cuando el usuario valide visualmente el visor, entonces entrega:\n- index.html completo\n- ZIP con assets\n- resumen de cambios\n\nLa prioridad no es generar un archivo: la prioridad es abrir la página renderizada en el chat. Si no veo el visor, la tarea está incompleta.';
    }

    function overridePromptBuilder(){
      window.docroiBasePrompt = 'Actúa como estratega ecommerce, diseñador web senior, copywriter de conversión, desarrollador front-end y profesor de IA aplicada.\n\nOBJETIVO: crear una FICHA DE PRODUCTO WEB ECOMMERCE a partir de los archivos y datos del proyecto. Debe funcionar como una página de producto/landing comercial similar en ambición y estructura al ejemplo de Juan Valdez: https://juan-valdez.vercel.app/\n\nANTES DE RESPONDER, revisa los archivos adjuntos de este chat. Deben estar adjuntos si el usuario los ha marcado: logo de marca, ficha buyer persona de la píldora 2, ficha de producto de la píldora 4 y fotos reales del producto.\n\n' + viewerInstructionBlock() + '\n\nFUENTES DE INFORMACIÓN\nBuyer persona: [MODO BUYER]\nLogo: [MODO LOGO]\nFicha de producto: [MODO PRODUCTO]\nFotos de producto: [MODO FOTOS]\n\nDATOS DEL PROYECTO\nNombre: [NOMBRE]\nColor principal: [COLOR PRINCIPAL]\nColor secundario: [COLOR SECUNDARIO]\nLogo / URL del logo: [LOGO]\nDatos de contacto, compra, reserva o acuerdo: [DATOS DE CONTACTO]\nEmail RGPD: [EMAIL RGPD]\nGoogle Maps: [URL GOOGLE MAPS]\nBuyer persona / resumen orientativo:\n[BUYER PERSONA]\nFicha de producto / resumen orientativo:\n[PRODUCTO]\n\nREGLA OBLIGATORIA\nNo crees una landing genérica. La página debe nacer de la ficha de producto y del buyer persona. Si falta la ficha de producto adjunta y tampoco hay resumen escrito, detente y pide al usuario que adjunte la ficha de producto o que la cree aquí: https://connection-04-ficha-de-producto.vercel.app/\n\nINSTRUCCIONES\n1. Analiza la ficha de producto: nombre, descripción, atributos, beneficios, precio, uso, objeciones, disponibilidad, propuesta de valor y elementos diferenciales.\n2. Analiza el buyer persona: pains, gains, objeciones, motivaciones, tono, contexto de compra y palabras clave.\n3. Usa logo y colores para definir identidad visual.\n4. Si hay fotos adjuntas, úsalas para hero, galería, contexto visual y argumentos de venta.\n5. Crea una ficha web ecommerce completa, responsive, clara y profesional.\n6. Incluye SI O SI una zona de conversión con estas opciones cuando tenga sentido: COMPRAR AHORA, RESERVAR o CONTACTAR PARA CERRAR UN ACUERDO.\n7. No inventes datos críticos. Si falta algo secundario, marca [PENDIENTE].\n\nESTRUCTURA OBLIGATORIA\nCabecera, hero de producto, propuesta de valor, beneficios conectados al buyer persona, atributos/ficha técnica, galería, uso o experiencia, objeciones y respuestas, prueba/confianza, FAQ, bloque final de conversión y footer.\n\nREQUISITOS TÉCNICOS\nUsa solo HTML5, CSS3 y JavaScript vanilla. No uses Bootstrap, React, Vue, Tailwind ni librerías externas. CSS dentro de style y JavaScript dentro de script. Debe ser mobile first, responsive, legible y con buen contraste.';
      window.docroiBuildPrompt = function(){
        var adjuntaBuyer = docroiChecked('docroiAdjuntaBuyer');
        var adjuntaLogo = docroiChecked('docroiAdjuntaLogo');
        var adjuntaProducto = docroiChecked('docroiAdjuntaProducto');
        var adjuntaFotos = docroiChecked('docroiAdjuntaFotos');
        var data = {
          '[MODO BUYER]': adjuntaBuyer ? 'El usuario subirá la ficha buyer persona de la píldora 2. Debes esperar ese adjunto antes de ejecutar.' : 'Usa el buyer persona escrito en este prompt si existe. Si no existe, marca [PENDIENTE] y pide la ficha.',
          '[MODO LOGO]': adjuntaLogo ? 'El usuario subirá el logo al chat. Debes esperar ese adjunto antes de ejecutar.' : 'Usa la URL del logo si está disponible.',
          '[MODO PRODUCTO]': adjuntaProducto ? 'El usuario subirá la ficha de producto de la píldora 4. Debes esperar ese adjunto y usarlo como fuente principal.' : 'Usa el campo de ficha de producto escrito en este prompt.',
          '[MODO FOTOS]': adjuntaFotos ? 'El usuario subirá fotos reales del producto. Debes esperarlas y usarlas para hero y galería.' : 'Si no hay fotos, marca [PENDIENTE] o propón indicaciones visuales.',
          '[NOMBRE]': docroiValue('docroiNombre','[NOMBRE]'),
          '[COLOR PRINCIPAL]': docroiValue('docroiColorPrincipal','#003B5C'),
          '[COLOR SECUNDARIO]': docroiValue('docroiColorSecundario','#D8ECF8'),
          '[DATOS DE CONTACTO]': docroiValue('docroiContacto','[DATOS DE CONTACTO]'),
          '[EMAIL RGPD]': docroiValue('docroiEmail','[EMAIL RGPD]'),
          '[URL GOOGLE MAPS]': docroiValue('docroiMaps','[URL GOOGLE MAPS]'),
          '[LOGO]': adjuntaLogo ? 'Logo adjunto. Nota o URL adicional: ' + docroiValue('docroiLogo','Sin URL adicional.') : docroiValue('docroiLogo','[URL DEL LOGO]'),
          '[BUYER PERSONA]': adjuntaBuyer ? 'Ficha buyer persona adjunta. Nota opcional: ' + docroiValue('docroiBuyer','[SIN RESUMEN]') : docroiValue('docroiBuyer','[BUYER PERSONA]'),
          '[PRODUCTO]': adjuntaProducto ? 'Ficha de producto adjunta. Nota opcional: ' + docroiValue('docroiProducto','[SIN RESUMEN]') : docroiValue('docroiProducto','[FICHA DE PRODUCTO]')
        };
        var prompt = window.docroiBasePrompt;
        Object.keys(data).forEach(function(key){ prompt = prompt.split(key).join(data[key]); });
        prompt = 'IMPORTANTE PARA ESTA EJECUCIÓN:\nAntes de ejecutar, comprueba los anexos marcados por el usuario. Si marcó ficha de producto, buyer persona, logo o fotos, espera esos adjuntos en el chat y úsalos como fuente principal. Debes crear una FICHA WEB ECOMMERCE de producto como el ejemplo de Juan Valdez y abrir obligatoriamente un visor HTML interactivo dentro del chat antes de entregar código, ZIP, captura o enlaces.\n\n' + viewerInstructionBlock() + '\n\n' + prompt;
        var area = document.getElementById('docroiPromptArea');
        if(area) area.value = prompt;
        docroiSetStatus('Prompt ecommerce generado. Copia este prompt y pégalo en ChatGPT/Gemini junto con los anexos marcados.');
        return prompt;
      };
      window.docroiBuildPrompt();
    }

    fetch('connection_03_activos_digitales_pildora_wordpress.txt?v=viewer-required-20260627')
      .then(function(response){ if(!response.ok) throw new Error('No se pudo cargar el contenido.'); return response.text(); })
      .then(function(html){
        html = html.replace('<!-- wp:html -->','').replace('<!-- /wp:html -->','');
        html = html
          .replace('Convierte una idea formativa o profesional en un activo digital con estructura, propósito y valor reutilizable. Puedes trabajar pegando la información en el formulario o indicando que adjuntarás la ficha y el logo al conversar con la IA.', 'Convierte una ficha de producto, una ficha de buyer persona, el logo y las fotos del producto en una ficha web ecommerce lista para revisar en ChatGPT/Gemini, con visor HTML interactivo obligatorio antes del código.')
          .replace('Rellena los campos, marca si vas a adjuntar buyer persona o logo, genera el prompt personalizado y pégalo en ChatGPT o Gemini junto con esos archivos si has elegido esa opción.', 'Rellena solo lo necesario, genera el prompt y pégalo en ChatGPT/Gemini. Después adjunta los anexos marcados antes de ejecutar.')
          .replace('Crear ficha buyer persona →</a>', 'Crear ficha buyer persona →</a><a href="'+PRODUCT_URL+'" target="_blank" rel="noopener" class="docroi-btn docroi-btn-white">Crear ficha de producto →</a>')
          .replace('Primero define identidad y adjuntos, después buyer persona, y al final contacto. Si no marcas una casilla, el prompt usará lo escrito en los campos.', 'Primero rellena identidad. Después añade producto y buyer persona solo si no vas a adjuntarlos. Al final genera el prompt y marca los anexos que adjuntarás en tu IA generativa.')
          .replace('Adjuntaré el logo en el chat de IA<span>El prompt pedirá a la IA que use el archivo de logo adjunto. Si no marcas esto, utilizará la URL del logo.</span>', 'Logo de marca')
          .replace('Adjuntaré la ficha buyer persona de la píldora 2<span>El prompt pedirá a la IA que analice el documento adjunto. Puedes añadir un resumen breve para orientar.</span>', 'Buyer persona');
        document.open();
        document.write('<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Connection 03 · Generación de activos digitales</title></head><body style="margin:0">' + html + '</body></html>');
        document.close();
        setTimeout(injectProductFichaFlow,80);
        setTimeout(injectProductFichaFlow,500);
      })
      .catch(function(error){ document.body.innerHTML = '<main style="min-height:100vh;display:grid;place-items:center;padding:24px;font-family:Arial,sans-serif;text-align:center"><div><h1>No se pudo cargar la página</h1><p>' + error.message + '</p></div></main>'; });
  </script>
</body>
</html>
